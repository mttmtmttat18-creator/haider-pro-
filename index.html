<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بطاقة حيدر الشخصية</title>
    <style>
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); text-align: center; color: white; box-shadow: 0 8px 32px rgba(0,0,0,0.3); transition: 0.5s; width: 300px; }
        .card:hover { transform: translateY(-10px); border-color: #00ffcc; box-shadow: 0 8px 32px #00ffcc44; }
        .profile-pic { width: 100px; height: 100px; border-radius: 50%; background: #00ffcc; margin: 0 auto 15px; border: 3px solid #fff; }
        h1 { font-size: 24px; margin-bottom: 5px; color: #00ffcc; }
        p { font-size: 14px; opacity: 0.8; }
        .btn { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #00ffcc; color: #000; text-decoration: none; border-radius: 50px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="profile-pic"></div>
        <h1>حيدر</h1>
        <p>مطور أدوات أتمتة ومواقع سحابية ⚡</p>
        <p>مرحباً بكم في عالمي التقني!</p>
        <a href="#" class="btn">تواصل معي</a>
    </div>
</body>
</html>
